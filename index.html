<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="top-bar">
      <h1 class="game-title">TETRIS</h1>
      <label class="skin-select" title="Elegir skin visual">
        <span class="skin-select-label">SKIN</span>
        <select id="skin-select" aria-label="Elegir skin visual">
          <option value="retro">Retro</option>
          <option value="neon">Neon</option>
          <option value="pastel">Pastel</option>
          <option value="pixel">Pixel Art</option>
        </select>
      </label>
      <label class="theme-switch" title="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle" aria-label="Cambiar tema claro/oscuro" />
        <span class="slider">
          <span class="icon moon">🌙</span>
          <span class="icon sun">☀️</span>
        </span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div id="gameover-box" class="overlay-box hidden">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="new-highscore-form" class="new-highscore-form hidden">
          <label for="player-name">¡Nuevo récord! Introduce tu nombre:</label>
          <input type="text" id="player-name" maxlength="12" autocomplete="off" />
          <button id="save-score-btn">Guardar</button>
        </div>

        <div class="highscore-block">
          <span class="label">TOP 5</span>
          <div id="gameover-highscores"></div>
          <div class="best-stats" id="gameover-best-stats"></div>
        </div>

        <button id="restart-btn">Reiniciar</button>
        <button class="reset-scores-btn secondary-btn" type="button">Resetear records</button>
      </div>

      <div id="pause-box" class="overlay-box hidden">
        <p class="pause-title">PAUSA</p>
        <div class="pause-menu">
          <button id="resume-btn">Reanudar</button>
          <button id="pause-restart-btn">Reiniciar</button>
          <button id="toggle-controls-btn">Ver controles</button>
          <div id="pause-controls-list" class="pause-controls-list hidden"></div>
          <div class="level-select-row">
            <label for="start-level-select">Nivel inicial</label>
            <select id="start-level-select">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <div id="start-overlay" class="overlay">
      <div class="overlay-box">
        <p class="overlay-heading">TETRIS</p>

        <div class="highscore-block">
          <span class="label">TOP 5</span>
          <div id="start-highscores"></div>
          <div class="best-stats" id="start-best-stats"></div>
        </div>

        <button id="start-btn">Empezar</button>
        <button class="reset-scores-btn secondary-btn" type="button">Resetear records</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
